apiVersion: v1
kind: Service
metadata:
  name: locust-master
  labels:
    app: locust-master
spec:
  ports:
    - port: 8089
      targetPort: 8089
      name: web
    - port: 5557
      targetPort: 5557
      name: communication
    - port: 9191
      targetPort: 9191
      name: prometheus
  selector:
    app: locust-master
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
        - name: locust-master
          # NOTE: Ensure this is updated to your actual image in Jenkins
          image: vernondegala/petstore-locust:latest
          command: ["locust"]
          args: 
            - "-f"
            - "locustfile.py"
            - "--master"
            - "--web-host"
            - "0.0.0.0"
            - "--host"
            - "https://petstore.swagger.io"
          ports:
            - containerPort: 8089
            - containerPort: 5557
            - containerPort: 9191
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust-worker
          image: vernondegala/petstore-locust:latest
          command: ["locust"]
          args: 
            - "-f"
            - "locustfile.py"
            - "--worker"
            - "--master-host"
            - "locust-master"
            - "--host"
            - "https://petstore.swagger.io"
