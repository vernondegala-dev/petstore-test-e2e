apiVersion: v1
kind: Service
metadata:
  name: locust-master
  labels:
    app: locust-master
spec:
  ports:
    - port: 8089
      targetPort: 8089
      name: web
    - port: 5557
      targetPort: 5557
      name: communication
  selector:
    app: locust-master
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
        - name: locust-master
          image: your-docker-repo/petstore-locust:latest
          # 1. Added explicit file loading paths to the master process
          args: ["-f", "locustfile.py", "--master"]
          ports:
            - containerPort: 8089
            - containerPort: 5557
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust-worker
          image: your-docker-repo/petstore-locust:latest
          # 2. Added explicit file loading paths to the worker group
          args: ["-f", "locustfile.py", "--worker", "--master-host=locust-master"]